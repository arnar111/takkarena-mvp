<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- T Shape (Indigo to Cyan) -->
    <path d="M 30 40 L 90 40 M 60 40 L 60 140" 
          stroke="url(#grad1)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- A Shape (Cyan to Emerald) -->
    <path d="M 110 140 L 140 40 L 170 140 M 125 100 L 155 100" 
          stroke="url(#grad2)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
